<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador — Salud Pública UCSUR</title>
<style>
  :root{
    --bg:#f6f4ee;
    --panel:#ffffff;
    --ink:#1f2a24;
    --muted:#6b7872;
    --line:#dfe3de;
    --primary:#1f6f54;
    --primary-dark:#154a38;
    --accent:#d97a3d;
    --accent-soft:#fbe9da;
    --ok:#1f6f54;
    --bad:#b2452f;
    --shadow:0 2px 10px rgba(31,42,36,0.06);
    --radius:10px;
    font-family:"Source Sans 3","Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:"Source Sans 3","Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{
    font-family:"Spectral","Georgia",serif;
    font-weight:600; letter-spacing:.2px;
  }
  /* ---------- HEADER ---------- */
  header{
    background:var(--primary-dark); color:#fff;
    padding:14px 20px; display:flex; align-items:center;
    justify-content:space-between; flex-wrap:wrap; gap:10px;
  }
  header .title-block h1{margin:0; font-size:1.15rem; color:#fff;}
  header .title-block .stage{
    font-size:.75rem; text-transform:uppercase; letter-spacing:1.5px;
    color:var(--accent); margin-top:2px; display:block;
  }
  .progress-wrap{flex:1; min-width:160px; max-width:320px; margin:0 16px;}
  .progress-bar{
    background:rgba(255,255,255,.18); border-radius:6px; height:8px; overflow:hidden;
  }
  .progress-bar > div{
    height:100%; background:var(--accent); width:0%;
    transition:width .3s ease;
  }
  .lang-toggle{
    display:flex; gap:4px; background:rgba(255,255,255,.12);
    border-radius:20px; padding:3px;
  }
  .lang-toggle button{
    border:none; background:transparent; color:#fff; padding:5px 12px;
    border-radius:16px; cursor:pointer; font-size:.8rem; font-weight:600;
    transition:.15s;
  }
  .lang-toggle button.active{background:var(--accent); color:#3a1c08;}

  /* ---------- LAYOUT ---------- */
  .layout{
    display:grid;
    grid-template-columns: 270px 1fr 250px;
    gap:14px; padding:16px; align-items:start;
    max-width:1280px; margin:0 auto;
  }
  @media (max-width: 980px){
    .layout{grid-template-columns:1fr;}
  }
  .panel{
    background:var(--panel); border:1px solid var(--line);
    border-radius:var(--radius); box-shadow:var(--shadow);
    padding:14px;
  }
  .panel h2{font-size:.95rem; margin:0 0 10px; color:var(--primary-dark);}
  .panel h3{font-size:.82rem; margin:14px 0 6px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px;}

  /* ---------- LEFT: EXPEDIENTE ---------- */
  #left-panel table{width:100%; border-collapse:collapse; font-size:.78rem; margin-top:4px;}
  #left-panel th, #left-panel td{
    text-align:left; padding:5px 6px; border-bottom:1px solid var(--line);
  }
  #left-panel th{color:var(--muted); font-weight:600;}
  .chart-bar-row{display:flex; align-items:center; gap:6px; margin:6px 0; font-size:.75rem;}
  .chart-bar-label{width:90px; flex-shrink:0; color:var(--muted);}
  .chart-bar-track{flex:1; background:var(--line); border-radius:4px; height:10px; overflow:hidden;}
  .chart-bar-fill{height:100%; background:var(--accent); border-radius:4px;}
  .chart-bar-value{width:36px; text-align:right; font-weight:600; font-size:.75rem;}
  .doc-card{
    border:1px solid var(--line); border-radius:8px; padding:8px; margin-top:8px;
    font-size:.78rem; background:#fbfaf6;
  }
  .doc-card a{color:var(--primary); text-decoration:none; font-weight:600;}
  .doc-card a:hover{text-decoration:underline;}

  /* ---------- MAIN STAGE ---------- */
  #main-stage .narrative{
    background:var(--accent-soft); border-left:4px solid var(--accent);
    padding:12px 14px; border-radius:8px; font-size:.95rem; line-height:1.5;
    margin-bottom:14px;
  }
  #main-stage .prompt{font-weight:700; margin:0 0 12px; font-size:1.02rem;}
  .options{display:flex; flex-direction:column; gap:10px;}
  .option-btn{
    text-align:left; border:1px solid var(--line); background:#fff;
    border-radius:8px; padding:12px 14px; cursor:pointer; font-size:.92rem;
    transition:.15s; line-height:1.4; color:var(--ink);
  }
  .option-btn:hover:not(:disabled){border-color:var(--primary); background:#f1f8f4;}
  .option-btn:focus-visible{outline:3px solid var(--primary); outline-offset:2px;}
  .option-btn:disabled{cursor:default; opacity:.85;}
  .option-btn.correct{border-color:var(--ok); background:#eaf6ef;}
  .option-btn.incorrect{border-color:var(--bad); background:#fbeae6;}
  .option-label{font-weight:700; margin-right:6px;}

  .feedback-panel{
    margin-top:12px; padding:12px 14px; border-radius:8px; font-size:.9rem;
    line-height:1.5; display:none;
  }
  .feedback-panel.show{display:block; animation:slidein .25s ease;}
  .feedback-panel.correct{background:#eaf6ef; border:1px solid var(--ok); color:#13402e;}
  .feedback-panel.incorrect{background:#fbeae6; border:1px solid var(--bad); color:#5e2317;}
  .feedback-icon{font-weight:800; margin-right:6px;}
  @keyframes slidein{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  textarea#reflection-text{
    width:100%; min-height:120px; border:1px solid var(--line); border-radius:8px;
    padding:10px; font-size:.92rem; font-family:inherit; resize:vertical;
  }
  .guidance{
    font-size:.82rem; color:var(--muted); background:#f1f5f2; border-radius:6px;
    padding:8px 10px; margin-bottom:10px;
  }

  .ending-box{text-align:center; padding:20px 10px;}
  .ending-box .label{color:var(--primary); font-size:1.1rem; margin-bottom:6px;}
  .ending-box .summary{font-size:.95rem; line-height:1.6; max-width:560px; margin:0 auto 16px;}

  /* ---------- RIGHT: BITACORA ---------- */
  #right-panel .log-item{
    font-size:.78rem; border-bottom:1px solid var(--line); padding:6px 0;
  }
  #right-panel .log-item .q{color:var(--muted);}
  #right-panel .log-item .a{font-weight:600;}
  .rubric-row{margin-bottom:10px;}
  .rubric-row label{display:block; font-size:.75rem; color:var(--muted); margin-bottom:3px;}
  .rubric-row input[type=range]{width:100%;}
  .rubric-val{font-size:.78rem; font-weight:700; color:var(--primary);}

  /* ---------- FOOTER ---------- */
  footer{
    display:flex; justify-content:space-between; gap:10px; padding:14px 20px 24px;
    max-width:1280px; margin:0 auto; flex-wrap:wrap;
  }
  .btn{
    border:none; border-radius:8px; padding:10px 18px; font-size:.9rem; font-weight:700;
    cursor:pointer; transition:.15s;
  }
  .btn-primary{background:var(--primary); color:#fff;}
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-secondary{background:transparent; border:1px solid var(--line); color:var(--ink);}
  .btn-secondary:hover{border-color:var(--primary); color:var(--primary);}
  .btn:disabled{opacity:.4; cursor:default;}

  /* ---------- MODAL (debrief / summary) ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(20,30,25,.55);
    display:none; align-items:center; justify-content:center; padding:20px; z-index:50;
  }
  .modal-overlay.show{display:flex;}
  .modal{
    background:#fff; border-radius:12px; max-width:640px; width:100%;
    max-height:85vh; overflow-y:auto; padding:24px;
  }
  .modal h2{margin-top:0; color:var(--primary-dark);}
  .modal h3{margin-top:18px; color:var(--primary); font-size:.95rem;}
  .modal ul{padding-left:20px; font-size:.9rem; line-height:1.6;}
  .modal .close-row{text-align:right; margin-top:18px;}

  .credits{font-size:.72rem; color:var(--muted); padding:0 20px 20px; max-width:1280px; margin:0 auto; line-height:1.5;}
</style>
</head>
<body>

<header>
  <div class="title-block">
    <h1 id="hdr-title">—</h1>
    <span class="stage" id="hdr-stage">—</span>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div id="progress-fill"></div></div>
  </div>
  <div class="lang-toggle">
    <button id="lang-es" class="active" onclick="setLang('es')">ES</button>
    <button id="lang-en" onclick="setLang('en')">EN</button>
  </div>
</header>

<div class="layout">
  <!-- LEFT: EXPEDIENTE -->
  <aside class="panel" id="left-panel">
    <h2 id="exp-title">Expediente</h2>
    <div id="exp-content"></div>
  </aside>

  <!-- MAIN STAGE -->
  <main class="panel" id="main-stage">
    <div class="narrative" id="node-narrative"></div>
    <p class="prompt" id="node-prompt"></p>
    <div class="guidance" id="node-guidance" style="display:none;"></div>
    <div class="options" id="node-options"></div>
    <textarea id="reflection-text" style="display:none;" placeholder=""></textarea>
    <div class="feedback-panel" id="feedback-panel"></div>
    <div class="ending-box" id="ending-box" style="display:none;"></div>
  </main>

  <!-- RIGHT: BITACORA -->
  <aside class="panel" id="right-panel">
    <h2 id="bit-title">Mi Bitácora</h2>
    <h3 id="bit-decisions-title">Decisiones</h3>
    <div id="log-decisions"><p style="font-size:.78rem;color:var(--muted);" id="log-empty">—</p></div>
    <h3 id="bit-rubric-title">Autoevaluación</h3>
    <div id="rubric-sliders"></div>
  </aside>
</div>

<footer>
  <button class="btn btn-secondary" id="btn-back" onclick="goBack()">⟵ Atrás</button>
  <button class="btn btn-primary" id="btn-continue" onclick="continueFlow()" disabled>Continuar</button>
  <button class="btn btn-secondary" id="btn-debrief" onclick="openDebrief()" style="display:none;">Ver Debrief</button>
</footer>

<!-- DEBRIEF MODAL -->
<div class="modal-overlay" id="debrief-modal">
  <div class="modal">
    <h2 id="debrief-heading">Debriefing — Modelo 3-D</h2>
    <div id="debrief-body"></div>
    <div class="close-row">
      <button class="btn btn-primary" onclick="closeDebrief()" id="debrief-close-btn">Cerrar</button>
    </div>
  </div>
</div>

<div class="credits" id="credits"></div>

<script>
/* ====================== ENGINE ====================== */
let LANG = "es";
let scenario = null;
let rubric = null;
let debrief = null;
let history = [];       // stack of node ids visited
let currentNodeId = null;
let pendingSelection = null; // {option, node} once chosen, before continue
let decisionLog = [];   // {prompt, answer, correct}
let reflections = {};   // nodeId -> text

const UI = {
  es: {
    exp: "Expediente", bitacora:"Mi Bitácora", decisiones:"Decisiones",

    decisionsTaken:"Decisions made",
    reflectionsTaken:"Written reflections",

function t(key){ return UI[LANG][key]; }
function bi(field){ return field ? (field[LANG] || field.es || field.en || "") : ""; }

/* ---------- SCORM (graceful no-op if absent) ---------- */
let scormAPI = null;
function findAPI(win){
  let attempts = 0;
  while (win && attempts < 10){
    if (win.API) return win.API;
    if (win.parent === win) break;
    win = win.parent; attempts++;
  }
  return null;
}
function initSCORM(){
  try{
    scormAPI = findAPI(window);
    if (scormAPI) scormAPI.LMSInitialize("");
  }catch(e){ scormAPI = null; }
}
function scormSetValue(k,v){
  try{ if(scormAPI) scormAPI.LMSSetValue(k, String(v)); }catch(e){}
}
window.addEventListener("beforeunload", ()=>{
  try{ if(scormAPI) scormAPI.LMSFinish(""); }catch(e){}
});

/* ---------- HEADER / LANG ---------- */
function setLang(lang, silent){
  LANG = lang;
  document.getElementById("lang-es").classList.toggle("active", lang==="es");
  document.getElementById("lang-en").classList.toggle("active", lang==="en");
  document.documentElement.lang = lang;
  if (!scenario) return;
  document.getElementById("hdr-title").textContent = bi(scenario.meta.title);
  const stageMap = {
    es:{diagnostico:"Etapa 1 · Diagnóstico Comunitario", promocion:"Etapa 2 · Promoción de la Salud", planificacion:"Etapa 3 · Planificación y Evaluación"},
    en:{diagnostico:"Stage 1 · Community Diagnosis", promocion:"Stage 2 · Health Promotion", planificacion:"Stage 3 · Planning & Evaluation"}
  };
  document.getElementById("hdr-stage").textContent = (stageMap[lang] && stageMap[lang][scenario.meta.stage]) || scenario.meta.stage;
  document.getElementById("exp-title").textContent = t("exp");
  document.getElementById("bit-title").textContent = t("bitacora");
  document.getElementById("bit-decisions-title").textContent = t("decisiones");
  document.getElementById("bit-rubric-title").textContent = t("autoeval");
  const logEmptyEl = document.getElementById("log-empty");
  if (logEmptyEl) logEmptyEl.textContent = decisionLog.length ? "" : t("empty");
  document.getElementById("btn-back").textContent = t("back");
  document.getElementById("btn-debrief").textContent = t("debriefBtn");
  document.getElementById("debrief-heading").textContent = t("debriefHeading");
  document.getElementById("debrief-close-btn").textContent = t("close");
  document.getElementById("reflection-text").placeholder = t("placeholderReflection");
  if (!silent){
    renderExpediente();
    renderRubricSliders();
    renderNode();
    renderLog();
  }

/* ---------- EXPEDIENTE (left panel / dashboard data) ---------- */
function renderExpediente(){
  const el = document.getElementById("exp-content");
  el.innerHTML = "";
  const dd = scenario.dashboard_data || {};

  (dd.tables||[]).forEach(tbl=>{
    const h = document.createElement("h3"); h.textContent = bi(tbl.title); el.appendChild(h);
    const table = document.createElement("table");
    const thead = document.createElement("tr");
    tbl.columns.forEach(c=>{ const th=document.createElement("th"); th.textContent=bi(c); thead.appendChild(th); });
    table.appendChild(thead);
    tbl.rows.forEach(row=>{
      const tr = document.createElement("tr");
      row.forEach(cell=>{ const td=document.createElement("td"); td.textContent=cell; tr.appendChild(td); });
      table.appendChild(tr);
    });
    el.appendChild(table);
  });

  (dd.charts||[]).forEach(ch=>{
    const h = document.createElement("h3"); h.textContent = bi(ch.title); el.appendChild(h);
    const max = Math.max(...ch.data.map(d=>d.value), 1);
    ch.data.forEach(d=>{
      const row = document.createElement("div"); row.className="chart-bar-row";
      const label = document.createElement("div"); label.className="chart-bar-label"; label.textContent = bi(d.label);
      const track = document.createElement("div"); track.className="chart-bar-track";
      const fill = document.createElement("div"); fill.className="chart-bar-fill"; fill.style.width=(d.value/max*100)+"%";
      track.appendChild(fill);
      const val = document.createElement("div"); val.className="chart-bar-value"; val.textContent = d.value+"%";
      row.appendChild(label); row.appendChild(track); row.appendChild(val);
      el.appendChild(row);
    });
  });

  (dd.documents||[]).forEach(doc=>{
    const card = document.createElement("div"); card.className="doc-card";
    const h = document.createElement("strong"); h.textContent = bi(doc.title);
    const p = document.createElement("p"); p.style.margin="4px 0"; p.textContent = bi(doc.summary);
    card.appendChild(h); card.appendChild(p);
    if (doc.link){
      const a = document.createElement("a"); a.href=doc.link; a.target="_blank"; a.rel="noopener";
      a.textContent = LANG==="es" ? "Ver referencia ↗" : "View reference ↗";
      card.appendChild(a);
    }
    el.appendChild(card);
  });
}

/* ---------- RUBRIC SLIDERS (live self-assessment) ---------- */
let rubricScores = {};
function renderRubricSliders(){
  const el = document.getElementById("rubric-sliders");
  el.innerHTML = "";
  if (!rubric) return;
  rubric.outcomes.forEach(o=>{
    if (rubricScores[o.id] === undefined) rubricScores[o.id] = 3;
    const row = document.createElement("div"); row.className="rubric-row";
    const label = document.createElement("label");
    label.textContent = bi(o.outcome);
    const input = document.createElement("input");
    input.type="range"; input.min=1; input.max=6; input.value = rubricScores[o.id];
    const val = document.createElement("span"); val.className="rubric-val"; val.textContent = rubricScores[o.id];
    input.addEventListener("input", ()=>{ rubricScores[o.id]=input.value; val.textContent=input.value; scormSetValue("cmi.suspend_data.rubric_"+o.id, input.value); });
    row.appendChild(label); row.appendChild(input); row.appendChild(val);
    el.appendChild(row);
  });
}

/* ---------- BITACORA LOG ---------- */
function renderLog(){
  const el = document.getElementById("log-decisions");
  el.innerHTML = "";
  if (decisionLog.length === 0){
    const p = document.createElement("p");
    p.style.fontSize=".78rem"; p.style.color="var(--muted)";
    p.textContent = t("empty");
    el.appendChild(p);
    return;
  }
  decisionLog.forEach(item=>{
    const div = document.createElement("div"); div.className="log-item";
    const q = document.createElement("div"); q.className="q"; q.textContent = bi(item.prompt);
    const a = document.createElement("div"); a.className="a";
    a.textContent = (item.correct ? "✔ " : "• ") + bi(item.optionText);
    div.appendChild(q); div.appendChild(a);
    el.appendChild(div);
  });
}

/* ---------- NODE RENDERING ---------- */
function getNode(id){ return scenario.nodes.find(n=>n.id===id); }

function renderNode(){
  const node = getNode(currentNodeId);
  const narrativeEl = document.getElementById("node-narrative");
  const promptEl = document.getElementById("node-prompt");
  const guidanceEl = document.getElementById("node-guidance");
  const optionsEl = document.getElementById("node-options");
  const feedbackEl = document.getElementById("feedback-panel");
  const reflectionEl = document.getElementById("reflection-text");
  const endingEl = document.getElementById("ending-box");
  const continueBtn = document.getElementById("btn-continue");
  const debriefBtn = document.getElementById("btn-debrief");

  // reset
  narrativeEl.style.display = "none";
  promptEl.style.display = "none";
  guidanceEl.style.display = "none";
  optionsEl.innerHTML = ""; optionsEl.style.display="none";
  feedbackEl.className = "feedback-panel"; feedbackEl.innerHTML=""; 
  reflectionEl.style.display = "none";
  endingEl.style.display = "none";
  continueBtn.style.display = "inline-block";
  continueBtn.disabled = true;
  continueBtn.textContent = t("continue");
  debriefBtn.style.display = "none";
  pendingSelection = null;

  updateProgress();

  if (node.type === "narrative_decision"){
    narrativeEl.style.display = "block";
    narrativeEl.textContent = bi(node.narrative);
    promptEl.style.display = "block";
    promptEl.textContent = bi(node.prompt);
    optionsEl.style.display = "flex";
    const labels = ["A","B","C","D"];
    node.options.forEach((opt, idx)=>{
      const btn = document.createElement("button");
      btn.className = "option-btn";
      btn.innerHTML = `<span class="option-label">${labels[idx]}.</span> ${bi(opt.text)}`;
      btn.onclick = ()=>selectOption(node, opt, btn);
      optionsEl.appendChild(btn);
    });
  }
  else if (node.type === "open_reflection"){
    promptEl.style.display = "block";
    promptEl.textContent = bi(node.prompt);
    if (node.guidance){
      guidanceEl.style.display = "block";
      guidanceEl.textContent = bi(node.guidance);
    }
    reflectionEl.style.display = "block";
    reflectionEl.value = reflections[node.id] || "";
    continueBtn.disabled = !reflectionEl.value.trim();
    reflectionEl.oninput = ()=>{ continueBtn.disabled = !reflectionEl.value.trim(); };
  }
  else if (node.type === "ending"){
    continueBtn.style.display = "none";
    debriefBtn.style.display = "inline-block";
    endingEl.style.display = "block";
    endingEl.innerHTML = `
      <h2 class="label">${bi(node.label)}</h2>
      <p class="summary">${bi(node.summary)}</p>
    `;
    showFinalSummaryButton(endingEl);
    scormSetValue("cmi.core.lesson_status", "completed");
    const avg = Object.values(rubricScores).reduce((a,b)=>a+Number(b),0) / Math.max(Object.values(rubricScores).length,1);
    scormSetValue("cmi.core.score.raw", Math.round(avg/6*100));
  }

  document.getElementById("btn-back").disabled = history.length<=1;
}

  const btn = document.createElement("button");

  btn.style.marginTop = "6px";
  btn.textContent = LANG==="es" ? "🖨 Imprimir / Guardar resumen" : "🖨 Print / Save summary";
  btn.onclick = printSummary;
  container.appendChild(btn);
}

  html += `</ul>`;
  if (Object.keys(reflections).length){
    html += `<h2>${t("reflectionsTaken")}</h2><ul>`;
    Object.entries(reflections).forEach(([k,v])=>{ html += `<li>${v.replace(/</g,"&lt;")}</li>`; });
    html += `</ul>`;
  }
  if (rubric){
    html += `<h2>${t("rubricScores")}</h2><ul>`;
    rubric.outcomes.forEach(o=>{ html += `<li>${bi(o.outcome)}: <strong>${rubricScores[o.id]}</strong></li>`; });
    html += `</ul>`;
  }
  html += `</body></html>`;
  w.document.write(html);
  w.document.close();
  w.print();
}

function selectOption(node, opt, btnEl){
  if (pendingSelection) return; // already answered
  pendingSelection = opt;
  const allBtns = document.querySelectorAll("#node-options .option-btn");
  allBtns.forEach(b=>b.disabled = true);
  btnEl.classList.add(opt.correct ? "correct" : "incorrect");

  const feedbackEl = document.getElementById("feedback-panel");
  feedbackEl.className = "feedback-panel show " + (opt.correct ? "correct" : "incorrect");
  feedbackEl.innerHTML = `<span class="feedback-icon">${opt.correct ? t("correct") : t("incorrect")}</span> ${bi(opt.feedback)}`;

  decisionLog.push({prompt: node.prompt, optionText: opt.text, correct: opt.correct, feedback: opt.feedback});
  renderLog();
  scormSetValue("cmi.interactions."+decisionLog.length+".id", node.id);
  scormSetValue("cmi.interactions."+decisionLog.length+".result", opt.correct ? "correct" : "incorrect");

  document.getElementById("btn-continue").disabled = false;
}

function continueFlow(){
  const node = getNode(currentNodeId);
  let nextId = null;
  if (node.type === "narrative_decision"){
    if (!pendingSelection) return;
    nextId = pendingSelection.next;
  } else if (node.type === "open_reflection"){
    const txt = document.getElementById("reflection-text").value.trim();
    if (!txt) return;
    reflections[node.id] = txt;
    scormSetValue("cmi.suspend_data.reflection_"+node.id, txt.slice(0,200));
    nextId = node.next;
  }
  if (!nextId) return;
  currentNodeId = nextId;
  history.push(currentNodeId);
  renderNode();
}

function goBack(){
  if (history.length<=1) return;
  history.pop();
  currentNodeId = history[history.length-1];
  // remove last decision log entry if it corresponds to the node we're leaving forward from
  renderNode();
}

function updateProgress(){
  // approximate progress: count narrative_decision + open_reflection nodes total vs visited
  const total = scenario.nodes.filter(n=>n.type!=="ending").length;
  const visited = new Set(history).size;
  const pct = Math.min(100, Math.round((visited/Math.max(total,1))*100));
  document.getElementById("progress-fill").style.width = pct+"%";
}

/* ---------- DEBRIEF MODAL ---------- */
function openDebrief(){
  const body = document.getElementById("debrief-body");
  body.innerHTML = "";
  if (!debrief){ body.innerHTML = "<p>—</p>"; }
  else{
    ["defusing","discovery","deepening"].forEach(key=>{
      const section = debrief[key];
      if (!section) return;
      const h = document.createElement("h3"); h.textContent = bi(section.title) || key;
      const ul = document.createElement("ul");
      (section[LANG]||section.es||[]).forEach(q=>{
        const li = document.createElement("li"); li.textContent = q; ul.appendChild(li);
      });
      body.appendChild(h); body.appendChild(ul);
    });
  }
  document.getElementById("debrief-modal").classList.add("show");
}
function closeDebrief(){
  document.getElementById("debrief-modal").classList.remove("show");
}

/* ---------- CREDITS ---------- */
function renderCredits(){
  document.getElementById("credits").textContent = bi(scenario.meta.credits);
}

loadData().catch(err=>{
  document.body.innerHTML = `<div style="padding:40px;font-family:sans-serif;">
    <h2>Error al cargar el escenario</h2>
    <p>${err}</p>
    <p>Verifica que <code>scenario.json</code>, <code>rubric.json</code> y <code>debrief.json</code> existan en esta misma carpeta.</p>
  </div>`;
});
